name: Release

# Publishes to crates.io when a version tag (e.g. v0.1.1) is pushed.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

      # Fail early if the tag doesn't match the version in Cargo.toml,
      # so we never publish a mismatched release.
      - name: Verify tag matches Cargo.toml version
        run: |
          cargo_version="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[0].version')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME (version $tag_version) does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi
          echo "Version $cargo_version matches tag $GITHUB_REF_NAME"

      - name: Publish
        run: cargo publish --token "${CARGO_REGISTRY_TOKEN}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
